spring.application.name=finance-backend

# ── Server ────────────────────────────────────────────────────────────────────
# ${PORT:8080} means: use Railway's PORT variable, fallback to 8080 locally
server.port=${PORT:8080}

# ── H2 Database ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:./data/financedb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── H2 Console (dev only) ─────────────────────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=3f8a2b1c9d4e7f0a6b5c8d2e1f4a7b0c3d6e9f2a5b8c1d4e7f0a3b6c9d2e5f8
app.jwt.expiration-ms=28800000

# ── Server URL (used by Swagger to point requests at the right host) ──────────
# Change this to your Railway URL after deploying
app.server-url=https://finance-backend-production-4aa1.up.railway.app

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────────
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/v3/api-docs

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.finance=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR
